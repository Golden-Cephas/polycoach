<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Seat Status — PolyCoach</title>
<link rel="stylesheet" href="/css/Home-Page.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
#errMsg{display:none;background:#fef3cd;color:#856404;border-radius:6px;padding:12px;margin-top:12px;font-weight:600;font-size:0.9rem;}
.reg-hint{margin-top:10px;text-align:center;font-size:0.88rem;color:#ddd;}
.reg-hint a{color:var(--accent);font-weight:700;}
</style>
</head>
<body>
<div class="Home-Page-Header">
  <div class="Left-Header" onclick="location.href='Home-Page.html'"><img src="/Images/Logo1.png" class="Logo1" alt="Logo"><div class="Logo-Text">PolyCoach</div></div>
  <div class="Right-Header">
    <button class="Header-Button" onclick="location.href='Home-Page.html'">Home</button>
    <button class="Header-Button" onclick="location.href='Book-Login.html'">Book</button>
    <button class="Header-Button" onclick="location.href='Help.html'">Help</button>
    <button class="Register-Button" onclick="location.href='Register.html'">Register</button>
  </div>
</div>

<div class="Page-Body-Hero">
  <div class="page-card-container">
    <div class="page-hero-title">
      <h1>Check Seat Availability</h1>
      <p>Login to view the live bus seat status.</p>
    </div>
    <div class="form-card">
      <form id="statusForm">
        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="099..." required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn" id="viewBtn">VIEW SEAT STATUS</button>
        <div id="errMsg"></div>
      </form>
      <div class="reg-hint">
        <p style="color:#666;margin-top:14px;font-size:0.88rem;">Not registered yet? <a href="Register.html">Register here</a> to book your seat.</p>
      </div>
    </div>
  </div>
</div>

<div class="Home-Page-Footer">
  <div class="Home-Left-Footer"><img src="/Images/Logo3.png" class="Logo1" alt="Logo"><div class="Logo-Text1">PolyCoach</div></div>
  <div class="Home-Mid-Footer">
    <button class="Footer-Button" onclick="openPopup('about')">About Us</button>
    <button class="Footer-Button" onclick="openPopup('faq')">FAQs</button>
    <button class="Footer-Button" onclick="openPopup('contact')">Contact</button>
  </div>
  <div class="Home-Right-Footer"><div class="Footer-Text">Social Media:</div><div class="Social-Container">
    <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Facebook.png"></div></a>
    <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Twitter.png"></div></a>
    <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Whatsapp.png"></div></a>
  </div></div>
</div>
<div id="popupOverlay" class="popup-overlay"><div class="popup-box"><div id="popupContent"></div><button class="close-btn" onclick="closePopup()">Close</button></div></div>

<script src="/js/popup.js"></script>
<script>
document.getElementById("statusForm").addEventListener("submit",async function(e){
  e.preventDefault();
  const err=document.getElementById("errMsg");
  const btn=document.getElementById("viewBtn");
  btn.disabled=true;btn.textContent="Checking...";err.style.display="none";
  try{
    const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:document.getElementById("phone").value.trim(),password:document.getElementById("password").value})});
    const d=await r.json();
    if(d.success){
      localStorage.setItem("polycoachUser",JSON.stringify(d.user));
      window.location.href=d.user.role==="admin"?"Admin-Dashboard.html":"Bust-Status-Lay.html";
    } else {
      err.style.display="block";
      err.textContent=(d.message||"Wrong credentials.")+" If you're not registered, please register to book your seat.";
      btn.disabled=false;btn.textContent="VIEW SEAT STATUS";
    }
  }catch{err.style.display="block";err.textContent="Server error. Please try again.";btn.disabled=false;btn.textContent="VIEW SEAT STATUS";}
});
</script>
</body>
</html>
