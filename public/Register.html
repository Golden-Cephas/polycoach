<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — PolyCoach</title>
<link rel="stylesheet" href="/css/Home-Page.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.reg-grid .full{grid-column:span 2;}
.reg-hint{font-size:0.78rem;color:var(--muted);margin-top:4px;}
.file-label{display:flex;align-items:center;gap:10px;background:#f4f7f9;border:1px dashed #0099ff;border-radius:6px;padding:12px;cursor:pointer;color:var(--primary);font-weight:700;font-size:0.88rem;}
.file-label input{display:none;}
#msg{margin-top:14px;padding:12px;border-radius:6px;font-weight:700;display:none;}
#msg.success{background:#e6f4ea;color:#2e7d32;}
#msg.error{background:#fdecea;color:var(--danger);}
@media(max-width:520px){.reg-grid{grid-template-columns:1fr;}.reg-grid .full{grid-column:span 1;}}
</style>
</head>
<body>

<div class="Home-Page-Header">
  <div class="Left-Header" onclick="location.href='Home-Page.html'">
    <img src="/Images/Logo1.png" class="Logo1" alt="Logo">
    <div class="Logo-Text">PolyCoach</div>
  </div>
  <div class="Right-Header">
    <button class="Header-Button" onclick="location.href='Home-Page.html'">Home</button>
    <button class="Header-Button" onclick="location.href='Book-Login.html'">Book</button>
    <button class="Header-Button" onclick="location.href='Help.html'">Help</button>
    <button class="Register-Button" onclick="location.href='Register.html'">Register</button>
  </div>
</div>

<div class="Page-Body-Hero">
  <div class="page-card-container" style="max-width:560px;">
    <div class="page-hero-title">
      <h1>Student Registration</h1>
      <p>Use your official MUBAS details to create your account.</p>
    </div>
    <div class="form-card">
      <form id="regForm" enctype="multipart/form-data">
        <div class="reg-grid">
          <div class="input-group full">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
          </div>
          <div class="input-group">
            <label>Registration Number</label>
            <input type="text" id="regNumber" placeholder="BEEE/22/SS/033" required>
            <span class="reg-hint">Must be writen in slash format  </span>
          </div>
          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="099..." required>
          </div>
          <div class="input-group full">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" required>
          </div>
          <div class="input-group full">
            <label>Upload Student ID/Recent Photo</label>
            <label class="file-label">
              <i class="fa-solid fa-id-card"></i>
              <span id="fileLabel">Choose Student ID image...</span>
              <input type="file" id="studentID" accept="image/*">
            </label>
          </div>
        </div>
        <button type="submit" class="submit-btn">REGISTER NOW</button>
        <div id="msg"></div>
        <div class="login-footer">
          <p>Already have an account? <a href="Book-Login.html">Login to book</a></p>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="Home-Page-Footer">
  <div class="Home-Left-Footer"><img src="/Images/Logo3.png" class="Logo1" alt="Logo"><div class="Logo-Text1">PolyCoach</div></div>
  <div class="Home-Mid-Footer">
    <button class="Footer-Button" onclick="openPopup('about')">About Us</button>
    <button class="Footer-Button" onclick="openPopup('faq')">FAQs</button>
    <button class="Footer-Button" onclick="openPopup('contact')">Contact</button>
  </div>
  <div class="Home-Right-Footer">
    <div class="Footer-Text">Social Media:</div>
    <div class="Social-Container">
      <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Facebook.png"></div></a>
      <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Twitter.png"></div></a>
      <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Whatsapp.png"></div></a>
    </div>
  </div>
</div>
<div id="popupOverlay" class="popup-overlay"><div class="popup-box"><div id="popupContent"></div><button class="close-btn" onclick="closePopup()">Close</button></div></div>

<script src="/js/popup.js"></script>
<script>
document.getElementById("studentID").addEventListener("change",function(){
  const fl=document.getElementById("fileLabel");
  fl.textContent=this.files[0]?this.files[0].name:"Choose Student ID image...";
});

document.getElementById("regForm").addEventListener("submit",async function(e){
  e.preventDefault();
  const msg=document.getElementById("msg");
  const regNum=document.getElementById("regNumber").value.trim();
  const slashes=(regNum.match(/\//g)||[]).length;
  if(slashes!==3){
    msg.className="error";msg.style.display="block";
    msg.textContent="Invalid Registration Number format. Must contain exactly 3 slashes (e.g. BEEE/22/EE/01).";
    return;
  }
  const btn=this.querySelector("button[type=submit]");
  btn.disabled=true;btn.textContent="Registering...";
  const fd=new FormData();
  fd.append("name",document.getElementById("name").value);
  fd.append("regNumber",regNum);
  fd.append("phone",document.getElementById("phone").value);
  fd.append("password",document.getElementById("password").value);
  const f=document.getElementById("studentID").files[0];
  if(f) fd.append("studentID",f);
  try{
    const r=await fetch("/api/register",{method:"POST",body:fd});
    const d=await r.json();
    if(d.success){window.location.href="Thanks-Remark1.html";}
    else{msg.className="error";msg.style.display="block";msg.textContent=d.message||"Registration failed.";btn.disabled=false;btn.textContent="REGISTER NOW";}
  }catch{msg.className="error";msg.style.display="block";msg.textContent="Server error. Please try again.";btn.disabled=false;btn.textContent="REGISTER NOW";}
});
</script>
</body>
</html>
